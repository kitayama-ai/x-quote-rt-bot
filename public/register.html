<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アカウント登録 — X Auto Post</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-card: #12121a;
      --border: #1e1e2e;
      --text: #e4e4e7;
      --text-muted: #71717a;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #22c55e;
      --error: #ef4444;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      max-width: 420px;
      width: calc(100% - 32px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .logo {
      width: 48px; height: 48px;
      margin: 0 auto 24px;
      background: var(--accent);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 28px; height: 28px; fill: #fff; }
    h1 { text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
    input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { text-align: center; margin-top: 16px; font-size: 13px; padding: 10px; border-radius: 8px; display: none; }
    .msg.error { display: block; background: rgba(239,68,68,0.1); color: var(--error); border: 1px solid rgba(239,68,68,0.2); }
    .msg.success { display: block; background: rgba(34,197,94,0.1); color: var(--success); border: 1px solid rgba(34,197,94,0.2); }
    .invalid-token {
      text-align: center;
      padding: 60px 20px;
    }
    .invalid-token h2 { margin-bottom: 12px; }
    .invalid-token p { color: var(--text-muted); }
    .pw-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card" id="mainCard">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
  </div>
  <h1>アカウント登録</h1>
  <p class="subtitle">ダッシュボードへのログイン情報を設定してください</p>

  <div id="formSection">
    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" id="regEmail" placeholder="your@email.com" />
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="regPassword" placeholder="8文字以上" />
      <div class="pw-hint">英数字を含む8文字以上</div>
    </div>
    <div class="form-group">
      <label>パスワード（確認）</label>
      <input type="password" id="regPasswordConfirm" placeholder="もう一度入力" />
    </div>
    <button class="btn" id="registerBtn">アカウントを作成</button>
    <div class="msg" id="regMsg"></div>
  </div>

  <div id="invalidSection" class="invalid-token" style="display:none;">
    <h2>⚠️ 無効なリンク</h2>
    <p>この招待リンクは無効または期限切れです。<br/>管理者に新しいリンクを依頼してください。</p>
  </div>

  <div id="successSection" style="display:none; text-align:center;">
    <div style="font-size:48px; margin-bottom:16px;">✅</div>
    <h2>登録完了！</h2>
    <p style="color:var(--text-muted); margin:12px 0 24px;">アカウントが作成されました。ダッシュボードにログインできます。</p>
    <a href="/" class="btn" style="display:inline-block; text-decoration:none; text-align:center;">ダッシュボードへ</a>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyD5qtQwX6w70KmADqJqLngh4uN8G-aZnv8",
    authDomain: "isai-11f7b.firebaseapp.com",
    projectId: "isai-11f7b",
    storageBucket: "isai-11f7b.firebasestorage.app",
    messagingSenderId: "457322161967",
    appId: "1:457322161967:web:132d79d10ac3387b83e3da",
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // URLパラメータからトークンを取得
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  const formSection = document.getElementById("formSection");
  const invalidSection = document.getElementById("invalidSection");
  const successSection = document.getElementById("successSection");
  const regMsg = document.getElementById("regMsg");
  const registerBtn = document.getElementById("registerBtn");

  let inviteData = null;

  // トークンを検証
  async function validateToken() {
    if (!token) {
      formSection.style.display = "none";
      invalidSection.style.display = "block";
      return;
    }

    try {
      const doc = await db.collection("invites").doc(token).get();
      if (!doc.exists) {
        formSection.style.display = "none";
        invalidSection.style.display = "block";
        return;
      }
      inviteData = doc.data();

      // 使用済みチェック
      if (inviteData.used) {
        formSection.style.display = "none";
        invalidSection.style.display = "block";
        return;
      }

      // 期限チェック (24時間)
      if (inviteData.expires_at) {
        const expires = inviteData.expires_at.toDate ? inviteData.expires_at.toDate() : new Date(inviteData.expires_at);
        if (new Date() > expires) {
          formSection.style.display = "none";
          invalidSection.style.display = "block";
          return;
        }
      }
    } catch (err) {
      console.error("Token validation error:", err);
      // Firestoreルールでブロックされる場合もあるのでフォームは表示
    }
  }
  validateToken();

  // 登録処理
  registerBtn.addEventListener("click", async () => {
    const email = document.getElementById("regEmail").value.trim();
    const password = document.getElementById("regPassword").value;
    const passwordConfirm = document.getElementById("regPasswordConfirm").value;

    regMsg.className = "msg";
    regMsg.style.display = "none";

    if (!email || !password) {
      showMsg("メールアドレスとパスワードを入力してください。", "error");
      return;
    }
    if (password.length < 6) {
      showMsg("パスワードは6文字以上にしてください。", "error");
      return;
    }
    if (password !== passwordConfirm) {
      showMsg("パスワードが一致しません。", "error");
      return;
    }

    registerBtn.disabled = true;
    registerBtn.innerHTML = '<span class="spinner"></span>作成中...';

    try {
      // Firebase Auth でユーザー作成
      const cred = await auth.createUserWithEmailAndPassword(email, password);
      const user = cred.user;

      // account_access にアクセス権を設定
      const dataUid = inviteData ? (inviteData.data_uid || "") : "";
      const accountId = inviteData ? (inviteData.account_id || "") : "";
      const role = inviteData ? (inviteData.role || "operator") : "operator";

      if (dataUid) {
        await db.collection("account_access").doc(email).set({
          data_uid: dataUid,
          account_id: accountId,
          role: role,
          created_at: firebase.firestore.FieldValue.serverTimestamp(),
          invited_by: inviteData ? (inviteData.created_by || "") : "",
        });
      }

      // ユーザープロフィール保存
      await db.collection("users").doc(user.uid).set({
        email: email,
        displayName: email.split("@")[0],
        provider: "email",
        role: role,
        data_uid: dataUid,
        account_id: accountId,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });

      // 招待トークンを使用済みに
      if (token) {
        await db.collection("invites").doc(token).update({
          used: true,
          used_by: email,
          used_at: firebase.firestore.FieldValue.serverTimestamp(),
        });
      }

      // ログアウト（ダッシュボードで改めてログインさせる）
      await auth.signOut();

      // 成功表示
      formSection.style.display = "none";
      successSection.style.display = "block";

    } catch (err) {
      console.error("Registration error:", err);
      if (err.code === "auth/email-already-in-use") {
        showMsg("このメールアドレスは既に登録されています。", "error");
      } else if (err.code === "auth/weak-password") {
        showMsg("パスワードが弱すぎます。6文字以上にしてください。", "error");
      } else if (err.code === "auth/invalid-email") {
        showMsg("メールアドレスの形式が正しくありません。", "error");
      } else {
        showMsg("登録に失敗しました: " + err.message, "error");
      }
      registerBtn.disabled = false;
      registerBtn.textContent = "アカウントを作成";
    }
  });

  // Enterキー対応
  document.getElementById("regPasswordConfirm").addEventListener("keydown", (e) => {
    if (e.key === "Enter") registerBtn.click();
  });

  function showMsg(text, type) {
    regMsg.textContent = text;
    regMsg.className = "msg " + type;
    regMsg.style.display = "block";
  }
</script>
</body>
</html>
